<style>

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:20px;
transition:.4s;
}

.gallery img:hover{
transform:scale(1.08);
}

</style>
