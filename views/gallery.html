<title>Gallery</title>
<link rel="stylesheet" href="/css/style.css">

<style>

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:80px 8%;
}

.gallery img{
width:100%;
height:250px;
object-fit:cover;
border-radius:20px;
transition:.4s;
}

.gallery img:hover{
transform:scale(1.08);
}

</style>

</head>

</nav>
